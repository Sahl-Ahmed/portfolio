<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sahl Ahmed | Portfolio</title>
    <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1425YjC4uNChURl7vD1S_7fsYdZ1z3Yur=w256-h256-p" />
    
    <!-- Preconnect to critical domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://lh3.googleusercontent.com" crossorigin />
    <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="dns-prefetch" href="https://lh3.googleusercontent.com" />
    <link rel="dns-prefetch" href="https://img.youtube.com" />
    <link rel="dns-prefetch" href="https://firestore.googleapis.com" />

    <!-- Highly optimized non-render-blocking google fonts loading -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" as="style" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" media="all" />

    <!-- Theme pre-loader script to prevent visual flickering on reload -->
    <script>
      (function() {
        try {
          var saved = localStorage.getItem('sahl_theme');
          var isDark = saved !== 'light';
          if (!isDark) {
            document.documentElement.classList.add('light-theme');
          } else {
            document.documentElement.classList.remove('light-theme');
          }
        } catch (e) {}
      })();
    </script>


    <meta name="description"
      content="Official portfolio of Sahl Ahmed showcasing UI/UX design, 3D modeling, 2D projects, graphic design, and other creative projects.">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
